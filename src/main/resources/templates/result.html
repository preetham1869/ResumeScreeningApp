<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload Result</title>
</head>
<body>

    <h1>Resume Uploaded Successfully</h1>

    <p><b>Name:</b> <span th:text="${name}"></span></p>
    <p><b>Email:</b> <span th:text="${email}"></span></p>
    <p><b>Phone:</b> <span th:text="${phone}"></span></p>
    <p><b>File Name:</b> <span th:text="${fileName}"></span></p>
    <p><b>Status:</b> <span th:text="${status}"></span></p>

    <h2>Extracted Skills</h2>
    <p th:text="${extractedSkills}"></p>

    <h2>Recommended Job</h2>
    <p th:text="${recommendedJob}"></p>

    <h2>Extracted Resume Text</h2>
    <textarea rows="20" cols="100" th:text="${extractedText}"></textarea>

    <p th:text="${error}"></p>

    <br><br>
    <a href="/">Go Back</a>

</body>
</html>
